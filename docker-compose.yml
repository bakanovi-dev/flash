services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/
      - DB_NAME=flashcards_deepseek
    expose:
      - "8000"
    depends_on:
      - mongodb

  frontend:
    build: .
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
