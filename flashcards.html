<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Карточки — Your Friends & Neighbors S01E01</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF7;
    --ink: oklch(0.16 0.01 270);
    --muted: oklch(0.55 0.01 270);
    --line: oklch(0.92 0 0);
    --accent: oklch(0.55 0.18 25);
    --know: oklch(0.55 0.13 155);
    --back: oklch(0.62 0.008 270);
    --learn-wash: oklch(0.96 0.04 25);
    --know-wash: oklch(0.96 0.04 155);
  }
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }

  .app {
    width: 100%; max-width: 560px;
    height: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    padding: 0 20px;
    position: relative;
  }
  @media (min-width: 768px)  { .app { max-width: 640px; padding: 0 32px; } }
  @media (min-width: 1200px) { .app { max-width: 720px; padding: 0 40px; } }

  .swipe-wash {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms ease, background 200ms ease;
    z-index: 0;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 0 14px;
    position: relative; z-index: 2;
  }
  .icon-btn {
    width: 28px; height: 28px;
    border: none; background: transparent;
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--ink); padding: 0;
  }
  .icon-btn:disabled { opacity: 0.25; cursor: default; }
  .pos {
    font-size: 12px; font-family: 'Geist Mono', ui-monospace, monospace;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .pos b { color: var(--ink); font-weight: 500; }

  .card-area {
    flex: 1;
    position: relative;
    padding: 12px 0 22px;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }
  .card-outer {
    flex: 1;
    position: relative;
    perspective: 1600px;
    cursor: pointer;
    touch-action: none;
  }
  .card-inner {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    transform: translateX(0) rotate(0) rotateY(0);
    transition: transform 420ms cubic-bezier(.25,.7,.3,1);
  }
  .card-inner.dragging { transition: none; }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 32px 28px;
    display: flex; flex-direction: column;
    transition: opacity 240ms ease, border-color 160ms ease;
    border: 1px solid var(--line);
  }
  .face.front { background: #fff; color: var(--ink); }
  .face.back {
    background: var(--back);
    color: #fff;
    transform: rotateY(180deg);
    opacity: 0;
    border-color: rgba(250,250,247,0.10);
  }
  .flipped .face.front { opacity: 0; }
  .flipped .face.back  { opacity: 1; }

  .word, .ru {
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-top: auto;
    overflow-wrap: break-word;
    word-break: break-word;
    hyphens: auto;
    font-size: 52px;
  }
  .ru { font-size: 44px; line-height: 1.1; letter-spacing: -0.02em; color: #fff; }
  .rule      { height: 1px; background: var(--line); margin: 20px 0; }
  .rule-back { height: 1px; background: rgba(255,255,255,0.2); margin: 20px 0; }
  .example { font-size: 15px; line-height: 1.55; color: var(--muted); }
  .ru-ex   { font-size: 15px; line-height: 1.55; color: rgba(255,255,255,0.7); }

  @media (min-width: 768px) {
    .word { font-size: 64px; }
    .ru   { font-size: 54px; }
    .face { padding: 44px 36px; }
    .example, .ru-ex { font-size: 16px; }
  }
  @media (min-width: 1200px) {
    .word { font-size: 72px; }
    .ru   { font-size: 60px; }
    .face { padding: 56px 44px; }
    .example, .ru-ex { font-size: 17px; }
  }

  .actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding-top: 16px;
  }
  .action-btn {
    appearance: none;
    padding: 14px 16px;
    background: #fff;
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .action-btn.learn { border: 1px solid var(--accent); color: var(--accent); }
  .action-btn.know  { border: 1px solid var(--know);   color: var(--know); }
  .arrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 14px; line-height: 1; opacity: 0.9;
  }
  .count {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .action-btn.learn .count {
    color: var(--accent);
    padding-left: 8px; margin-left: 4px;
    border-left: 1px solid oklch(0.55 0.18 25 / 0.3);
  }
  .action-btn.know .count {
    color: var(--know);
    padding-right: 8px; margin-right: 4px;
    border-right: 1px solid oklch(0.55 0.13 155 / 0.3);
  }

  @media (min-width: 768px) {
    .action-btn { padding: 18px 22px; font-size: 13px; }
    .actions    { gap: 14px; padding-top: 22px; }
  }

  .done {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 16px;
    z-index: 3;
    background: var(--bg);
  }
  .done .label {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); font-weight: 600;
  }
  .done h2 { font-size: 36px; font-weight: 500; letter-spacing: -0.02em; margin: 0; }
  .done .stats { display: flex; gap: 32px; margin-top: 8px; font-size: 13px; color: var(--muted); font-family: 'Geist Mono', monospace; }
  .done .stats span { display: block; font-size: 28px; font-weight: 500; font-family: 'Geist', sans-serif; }
  .done .stats .know-num span { color: var(--know); }
  .done .stats .learn-num span { color: var(--accent); }
  .done .reset {
    margin-top: 16px;
    padding: 10px 20px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; font-weight: 500;
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Flashcards.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<window.Flashcards />);
</script>
</body>
</html>
