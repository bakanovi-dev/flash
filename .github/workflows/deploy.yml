name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/flash || git clone https://github.com/bakanovi-dev/flash.git /opt/flash
            cd /opt/flash
            git pull origin main
            if ! docker compose version >/dev/null 2>&1; then
              mkdir -p "$HOME/.docker/cli-plugins"
              curl -fsSL https://github.com/docker/compose/releases/download/v2.27.1/docker-compose-linux-x86_64 \
                -o "$HOME/.docker/cli-plugins/docker-compose"
              chmod +x "$HOME/.docker/cli-plugins/docker-compose"
            fi
            docker stop flash 2>/dev/null || true
            docker rm flash 2>/dev/null || true
            docker compose up -d --build
