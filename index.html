<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Your Friends &amp; Neighbors S01E01</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<!-- API_BASE: пусто = relative URL (продакшн через nginx proxy)
     Для локальной разработки без Docker: window.API_BASE = 'http://localhost:8000' -->
<script>window.API_BASE = 'http://localhost:8000';</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Flashcards.jsx"></script>
<script type="text/babel" src="ReelCards.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {
    const [view, setView] = useState(() => {
      const p = window.location.pathname;
      if (p === '/cards') return 'flashcards';
      if (p === '/') return 'reel';
      return 'reel';
    });
    const [deckId, setDeckId] = useState('b1b2');

    function navigate(to, id) {
      if (to === 'flashcards') {
        if (id) setDeckId(id);
        window.history.pushState(null, '', '/cards');
        setView('flashcards');
      } else if (to === 'reel') {
        if (id) setDeckId(id);
        window.history.pushState(null, '', '/reel');
        setView('reel');
      } else {
        window.history.pushState(null, '', '/');
        setView('home');
      }
    }

    useEffect(() => {
      function onPopState() {
        const p = window.location.pathname;
        if (p === '/cards') setView('flashcards');
        else if (p === '/reel') setView('reel');
        else setView('home');
      }
      window.addEventListener('popstate', onPopState);
      return () => window.removeEventListener('popstate', onPopState);
    }, []);

    if (view === 'flashcards') {
      return <window.Flashcards onBack={() => navigate('home')} deckId={deckId} />;
    }
    if (view === 'reel') {
      return <window.ReelCards onBack={() => navigate('home')} deckId={deckId} />;
    }
    return <window.Home onNavigate={(id, mode) => navigate(mode || 'flashcards', id)} />;
  }

  (function mount() {
    if (window.Home && window.Flashcards && window.ReelCards) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } else {
      setTimeout(mount, 16);
    }
  })();
</script>
</body>
</html>
